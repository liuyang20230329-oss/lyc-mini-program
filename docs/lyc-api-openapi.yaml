openapi: 3.0.3
info:
  title: LYC 小宇宙学堂 API
  description: LYC 儿童启蒙学习平台后端 API，涵盖认证、内容管理、媒体播放、AI 分析、学习进度等模块。
  version: 1.0.0
  contact:
    name: LYC Team

servers:
  - url: http://127.0.0.1:3002
    description: 本地开发
  - url: https://api.lyc.example.com
    description: 生产环境

tags:
  - name: 认证
    description: 用户注册、登录、短信验证码、资料管理
  - name: 内容管理
    description: 分类、课程、段落的增删改查
  - name: 文件上传
    description: 音视频文件上传（单文件/分片）
  - name: 媒体播放
    description: 流式播放、签名 URL
  - name: AI 分析
    description: ASR 语音识别、智能分段
  - name: 学习进度
    description: 播放进度同步
  - name: 收藏
    description: 课程收藏管理

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 小程序端登录后获取的 JWT Token
    adminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: 管理员 API Key

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: "a1b2c3d4"
        openid:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
          example: "138****0001"
        nickname:
          type: string
          example: "微信用户"
        avatarUrl:
          type: string
          nullable: true
        gender:
          type: string
          enum: [male, female, undisclosed]
        role:
          type: string
          enum: [parent]
        phoneVerified:
          type: boolean
        profileCompleted:
          type: boolean
        status:
          type: string
          enum: [active, disabled]
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ChildProfile:
      type: object
      properties:
        id:
          type: string
        nickname:
          type: string
          example: "小星星"
        birthYear:
          type: integer
          nullable: true
          example: 2020
        birthMonth:
          type: integer
          nullable: true
          example: 6
        gender:
          type: string
          enum: [male, female, undisclosed]
        avatarUrl:
          type: string
          nullable: true
        isPrimary:
          type: boolean

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: "英语跟读"
        subtitle:
          type: string
          nullable: true
        badge:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        heroTitle:
          type: string
          nullable: true
        heroText:
          type: string
          nullable: true
        tone:
          type: string
          enum: [sky, sun, moon, mint]
        sortOrder:
          type: integer
        status:
          type: string
          enum: [active, deleted]
        createdAt:
          type: string
          format: date-time

    Course:
      type: object
      properties:
        id:
          type: string
        categoryId:
          type: string
        title:
          type: string
          example: "春晓"
        subtitle:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        durationText:
          type: string
          nullable: true
          example: "约 6 分钟"
        ageRange:
          type: string
          nullable: true
          example: "5-8 岁"
        difficulty:
          type: string
          nullable: true
        reward:
          type: integer
        coverLabel:
          type: string
          nullable: true
        mentor:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        audioUrl:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        totalDurationMs:
          type: integer
        fullText:
          type: string
          nullable: true
        asrStatus:
          type: string
          enum: [none, processing, done, failed]
        segmentCount:
          type: integer
        status:
          type: string
          enum: [active, deleted]
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    Segment:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        segmentIndex:
          type: integer
        title:
          type: string
          nullable: true
        cue:
          type: string
          nullable: true
        text:
          type: string
        translation:
          type: string
          nullable: true
        tip:
          type: string
          nullable: true
        startTimeMs:
          type: integer
        endTimeMs:
          type: integer
        audioUrl:
          type: string
          nullable: true
        durationMs:
          type: integer
        sortOrder:
          type: integer

    MediaFile:
      type: object
      properties:
        id:
          type: string
        originalName:
          type: string
        mimetype:
          type: string
        size:
          type: integer
        fileType:
          type: string
          enum: [audio, video]
        status:
          type: string
          enum: [ready, deleted]
        url:
          type: string
        createdAt:
          type: string
          format: date-time

    Progress:
      type: object
      properties:
        courseId:
          type: string
        currentSegmentIndex:
          type: integer
        lastPositionMs:
          type: integer
        playCount:
          type: integer
        completedSegments:
          type: array
          items:
            type: integer
        totalPlayMs:
          type: integer
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  # ========== 认证 ==========
  /api/v1/auth/wx-login:
    post:
      tags: [认证]
      summary: 微信登录
      description: 使用微信 wx.login 获取的 code 进行登录，自动注册新用户。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: wx.login 返回的 code
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
                  children:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChildProfile"
        "500":
          description: 登录失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/send-sms:
    post:
      tags: [认证]
      summary: 发送短信验证码
      description: 向手机号发送 6 位数字验证码，有效期 5 分钟。开发模式下会在响应中返回 devCode。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber]
              properties:
                phoneNumber:
                  type: string
                  pattern: "^1\\d{10}$"
                  example: "13800138000"
                purpose:
                  type: string
                  enum: [login, bind_phone]
                  default: login
      responses:
        "200":
          description: 发送成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  expiresInSeconds:
                    type: integer
                    example: 300
                  devCode:
                    type: string
                    description: 仅开发模式返回
                    example: "123456"

  /api/v1/auth/sms-login:
    post:
      tags: [认证]
      summary: 手机号验证码登录
      description: 使用手机号 + 验证码登录，手机号不存在时自动注册。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, code]
              properties:
                phoneNumber:
                  type: string
                  example: "13800138000"
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
                  children:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChildProfile"

  /api/v1/auth/bind-phone:
    post:
      tags: [认证]
      summary: 绑定手机号
      description: 已登录用户绑定手机号，需先获取 purpose=bind_phone 的验证码。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, code]
              properties:
                phoneNumber:
                  type: string
                code:
                  type: string
      responses:
        "200":
          description: 绑定成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  children:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChildProfile"
        "409":
          description: 手机号已被其他账号绑定

  /api/v1/auth/profile:
    get:
      tags: [认证]
      summary: 获取用户资料
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  children:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChildProfile"
    put:
      tags: [认证]
      summary: 更新用户资料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                avatarUrl:
                  type: string
                gender:
                  type: string
                  enum: [male, female, undisclosed]
      responses:
        "200":
          description: 更新成功

  /api/v1/auth/child:
    post:
      tags: [认证]
      summary: 创建宝贝信息
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nickname]
              properties:
                nickname:
                  type: string
                  example: "小星星"
                birthYear:
                  type: integer
                  example: 2020
                birthMonth:
                  type: integer
                  example: 6
                gender:
                  type: string
                  enum: [male, female, undisclosed]
      responses:
        "200":
          description: 创建成功

  /api/v1/auth/child/{childId}:
    put:
      tags: [认证]
      summary: 更新宝贝信息
      security:
        - bearerAuth: []
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                birthYear:
                  type: integer
                birthMonth:
                  type: integer
                gender:
                  type: string
                avatarUrl:
                  type: string
      responses:
        "200":
          description: 更新成功

  /api/v1/auth/logout:
    post:
      tags: [认证]
      summary: 退出登录
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功

  # ========== 内容管理 ==========
  /api/v1/content/categories:
    get:
      tags: [内容管理]
      summary: 获取分类列表
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
    post:
      tags: [内容管理]
      summary: 创建分类
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                subtitle:
                  type: string
                badge:
                  type: string
                icon:
                  type: string
                heroTitle:
                  type: string
                heroText:
                  type: string
                tone:
                  type: string
                sortOrder:
                  type: integer
      responses:
        "200":
          description: 创建成功

  /api/v1/content/categories/{id}:
    put:
      tags: [内容管理]
      summary: 更新分类
      security:
        - adminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                subtitle:
                  type: string
                tone:
                  type: string
                sortOrder:
                  type: integer
                status:
                  type: string
      responses:
        "200":
          description: 更新成功
    delete:
      tags: [内容管理]
      summary: 删除分类
      security:
        - adminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 删除成功

  /api/v1/content/courses:
    get:
      tags: [内容管理]
      summary: 获取课程列表
      parameters:
        - name: categoryId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
    post:
      tags: [内容管理]
      summary: 创建课程
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, categoryId]
              properties:
                categoryId:
                  type: string
                title:
                  type: string
                subtitle:
                  type: string
                summary:
                  type: string
                durationText:
                  type: string
                ageRange:
                  type: string
                difficulty:
                  type: string
                reward:
                  type: integer
                mentor:
                  type: string
                audioUrl:
                  type: string
                videoUrl:
                  type: string
                sortOrder:
                  type: integer
      responses:
        "200":
          description: 创建成功

  /api/v1/content/courses/{id}:
    get:
      tags: [内容管理]
      summary: 获取课程详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  course:
                    $ref: "#/components/schemas/Course"
                  segments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Segment"
    put:
      tags: [内容管理]
      summary: 更新课程
      security:
        - adminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                subtitle:
                  type: string
                summary:
                  type: string
                audioUrl:
                  type: string
                videoUrl:
                  type: string
                asrStatus:
                  type: string
                status:
                  type: string
                sortOrder:
                  type: integer
      responses:
        "200":
          description: 更新成功
    delete:
      tags: [内容管理]
      summary: 删除课程
      security:
        - adminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 删除成功

  /api/v1/content/courses/{courseId}/segments:
    post:
      tags: [内容管理]
      summary: 添加段落
      security:
        - adminKey: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                segmentIndex:
                  type: integer
                title:
                  type: string
                cue:
                  type: string
                text:
                  type: string
                translation:
                  type: string
                tip:
                  type: string
                startTimeMs:
                  type: integer
                endTimeMs:
                  type: integer
                sortOrder:
                  type: integer
      responses:
        "200":
          description: 创建成功

  /api/v1/content/segments/{segmentId}:
    put:
      tags: [内容管理]
      summary: 更新段落
      security:
        - adminKey: []
      parameters:
        - name: segmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                text:
                  type: string
                translation:
                  type: string
                tip:
                  type: string
                startTimeMs:
                  type: integer
                endTimeMs:
                  type: integer
      responses:
        "200":
          description: 更新成功
    delete:
      tags: [内容管理]
      summary: 删除段落
      security:
        - adminKey: []
      parameters:
        - name: segmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 删除成功

  # ========== 文件上传 ==========
  /api/v1/upload/single:
    post:
      tags: [文件上传]
      summary: 单文件上传
      description: 上传单个音视频文件，最大 200MB。
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                courseId:
                  type: string
                fileType:
                  type: string
                  enum: [audio, video]
                  default: audio
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    $ref: "#/components/schemas/MediaFile"

  /api/v1/upload/init:
    post:
      tags: [文件上传]
      summary: 分片上传初始化
      description: 初始化分片上传会话，返回 sessionId 和 uploadId。
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, mimetype, totalChunks]
              properties:
                filename:
                  type: string
                mimetype:
                  type: string
                totalSize:
                  type: integer
                totalChunks:
                  type: integer
                courseId:
                  type: string
                fileType:
                  type: string
                  enum: [audio, video]
      responses:
        "200":
          description: 初始化成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  uploadId:
                    type: string
                  key:
                    type: string
                  chunkSize:
                    type: integer
                    example: 5242880

  /api/v1/upload/chunk:
    post:
      tags: [文件上传]
      summary: 上传分片
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sessionId, partNumber, chunk]
              properties:
                sessionId:
                  type: string
                partNumber:
                  type: integer
                chunk:
                  type: string
                  format: binary
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  partNumber:
                    type: integer
                  etag:
                    type: string
                  receivedChunks:
                    type: integer
                  totalChunks:
                    type: integer

  /api/v1/upload/complete:
    post:
      tags: [文件上传]
      summary: 合并分片
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, parts]
              properties:
                sessionId:
                  type: string
                parts:
                  type: array
                  items:
                    type: object
                    properties:
                      partNumber:
                        type: integer
                      etag:
                        type: string
      responses:
        "200":
          description: 合并成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    $ref: "#/components/schemas/MediaFile"

  /api/v1/upload/abort:
    post:
      tags: [文件上传]
      summary: 取消分片上传
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId:
                  type: string
      responses:
        "200":
          description: 取消成功

  /api/v1/upload/{fileId}:
    delete:
      tags: [文件上传]
      summary: 删除文件
      security:
        - adminKey: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 删除成功

  # ========== 媒体播放 ==========
  /api/v1/media/stream/{key}:
    get:
      tags: [媒体播放]
      summary: 流式播放
      description: 音视频流式播放，支持 Range 请求（HTTP 206），可拖动进度条。
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: Range
          in: header
          description: "字节范围，如 bytes=0-1048575"
          schema:
            type: string
      responses:
        "200":
          description: 完整文件
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
            audio/mp4:
              schema:
                type: string
                format: binary
            video/mp4:
              schema:
                type: string
                format: binary
        "206":
          description: 部分内容（Range 请求）
          headers:
            Content-Range:
              schema:
                type: string
                example: "bytes 0-1048575/10485760"
            Accept-Ranges:
              schema:
                type: string
                example: bytes

  /api/v1/media/signed-url/{fileId}:
    get:
      tags: [媒体播放]
      summary: 获取签名 URL
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: expires
          in: query
          schema:
            type: integer
            default: 3600
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  expires:
                    type: integer

  /api/v1/media/info/{fileId}:
    get:
      tags: [媒体播放]
      summary: 获取文件信息
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功

  # ========== AI 分析 ==========
  /api/v1/ai/analyze/{courseId}:
    post:
      tags: [AI 分析]
      summary: 触发 ASR + 智能分段
      description: 对课程的音频文件触发阿里云 ASR 语音识别，识别完成后自动进行智能分段。
      security:
        - adminKey: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                languageHint:
                  type: string
                  enum: [zh, en]
                  default: zh
                sentences:
                  type: array
                  description: 手动提供的句子数据（无 ASR 时使用）
                  items:
                    type: object
                options:
                  type: object
                  properties:
                    minSegmentDuration:
                      type: integer
                      default: 5
                    maxSegmentDuration:
                      type: integer
                      default: 30
                    targetSegmentCount:
                      type: integer
      responses:
        "200":
          description: 已提交分析
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: processing
                  taskId:
                    type: string
                  courseId:
                    type: string
                  asrConfigured:
                    type: boolean

  /api/v1/ai/status/{courseId}:
    get:
      tags: [AI 分析]
      summary: 查询分析进度
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [none, processing, completed, error]
                  taskId:
                    type: string
                  courseId:
                    type: string
                  progress:
                    type: integer
                  segmentCount:
                    type: integer
                  message:
                    type: string

  /api/v1/ai/segments/{courseId}:
    put:
      tags: [AI 分析]
      summary: 人工调整段落
      description: 用完整的段落数组替换课程的 AI 分段结果。
      security:
        - adminKey: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [segments]
              properties:
                fullText:
                  type: string
                segments:
                  type: array
                  items:
                    type: object
                    required: [startTimeMs, endTimeMs]
                    properties:
                      title:
                        type: string
                      cue:
                        type: string
                      text:
                        type: string
                      translation:
                        type: string
                      tip:
                        type: string
                      startTimeMs:
                        type: integer
                      endTimeMs:
                        type: integer
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  courseId:
                    type: string
                  segmentCount:
                    type: integer

  # ========== 学习进度 ==========
  /api/v1/progress/sync:
    post:
      tags: [学习进度]
      summary: 同步学习进度
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId:
                  type: string
                currentSegmentIndex:
                  type: integer
                lastPositionMs:
                  type: integer
                playCount:
                  type: integer
                completedSegments:
                  type: array
                  items:
                    type: integer
                totalPlayMs:
                  type: integer
      responses:
        "200":
          description: 同步成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    $ref: "#/components/schemas/Progress"

  /api/v1/progress/{courseId}:
    get:
      tags: [学习进度]
      summary: 获取单课进度
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    $ref: "#/components/schemas/Progress"

  /api/v1/progress/:
    get:
      tags: [学习进度]
      summary: 获取全部进度
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Progress"

  # ========== 收藏 ==========
  /api/v1/favorites/{courseId}:
    post:
      tags: [收藏]
      summary: 添加收藏
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  favorited:
                    type: boolean
    delete:
      tags: [收藏]
      summary: 取消收藏
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功

  /api/v1/favorites/:
    get:
      tags: [收藏]
      summary: 获取收藏列表
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        courseId:
                          type: string
                        createdAt:
                          type: string
                          format: date-time

